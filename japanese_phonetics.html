<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現代日文音韻邏輯系統 - 摩登教材</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN for standalone running -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .shadow-3xl { box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simplified Icon Components using Lucide
        const Icon = ({ name, size = 24, className = "" }) => {
            const [iconSvg, setIconSvg] = useState("");
            useEffect(() => {
                if (window.lucide) {
                    const svg = window.lucide.createIcons();
                }
            }, []);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState(0);

            // Icon Mapping for internal logic
            const icons = {
                waves: <i data-lucide="waves" className="text-blue-400"></i>,
                shield: <i data-lucide="shield-alert" className="text-rose-400"></i>,
                zap: <i data-lucide="zap" className="text-amber-400"></i>,
                activity: <i data-lucide="activity"></i>,
                terminal: <i data-lucide="terminal" className="text-blue-400"></i>,
                box: <i data-lucide="box" className="text-rose-400"></i>
            };

            const sections = [
                {
                    id: 0,
                    title: "連濁邏輯",
                    tag: "CORE LOGIC",
                    iconName: "waves",
                    gradient: "from-blue-600/20 to-indigo-600/20",
                    content: (
                        <div className="space-y-6">
                            <div className="flex items-start gap-4 p-4 bg-slate-800/50 rounded-xl border border-slate-700">
                                <div className="mt-1 text-blue-400"><i data-lucide="terminal"></i></div>
                                <p className="text-slate-300 text-sm leading-relaxed">
                                    <span className="text-blue-400 font-bold underline decoration-blue-400/30">連濁 (Rendaku)</span> 並非隨機，而是一種發音的「自動優化機制」。當兩個語音單位結合時，系統會自動減少聲帶啟動的耗能。
                                </p>
                            </div>
                            
                            <div className="relative group overflow-hidden bg-gradient-to-br from-slate-800 to-slate-900 p-6 rounded-2xl border border-white/10 shadow-2xl text-center">
                                <div className="flex justify-between items-center mb-6 px-4">
                                    <div className="flex-1">
                                        <span className="block text-xs text-slate-500 mb-1 font-mono uppercase">Input A</span>
                                        <span className="text-2xl font-light tracking-widest text-white">あお</span>
                                    </div>
                                    <div className="px-4 text-blue-500 animate-pulse">+</div>
                                    <div className="flex-1">
                                        <span className="block text-xs text-slate-500 mb-1 font-mono uppercase">Input B</span>
                                        <span className="text-2xl font-light tracking-widest text-white underline decoration-red-500/50">そら</span>
                                    </div>
                                </div>
                                <div className="h-px bg-gradient-to-r from-transparent via-slate-600 to-transparent mb-6"></div>
                                <span className="block text-xs text-blue-400 mb-2 font-mono font-bold tracking-[0.2em]">OPTIMIZED OUTPUT</span>
                                <span className="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400 tracking-tighter">
                                    あおぞら
                                </span>
                            </div>

                            <div className="grid grid-cols-2 gap-4 text-left">
                                <div className="p-4 bg-white/5 rounded-lg border border-white/5">
                                    <h4 className="text-blue-400 text-xs font-bold mb-1">物理效率</h4>
                                    <p className="text-slate-400 text-[11px]">聲帶震動狀態的延續比「停止再重啟」更節能。</p>
                                </div>
                                <div className="p-4 bg-white/5 rounded-lg border border-white/5">
                                    <h4 className="text-blue-400 text-xs font-bold mb-1">語意耦合</h4>
                                    <p className="text-slate-400 text-[11px]">濁音化作為一種「連結器」，強化了詞彙的整體感。</p>
                                </div>
                            </div>
                        </div>
                    )
                },
                {
                    id: 1,
                    title: "平衡機制",
                    tag: "CONFLICT RESOLUTION",
                    iconName: "shield-alert",
                    gradient: "from-rose-600/20 to-orange-600/20",
                    content: (
                        <div className="space-y-6">
                            <h3 className="text-lg font-bold text-slate-100 flex items-center gap-2">
                                <i data-lucide="box" className="text-rose-400"></i> 萊曼定律 (Lyman's Law)
                            </h3>
                            <p className="text-slate-400 text-sm">
                                系統會自動偵測「音韻濁度」。若詞彙內部已存在濁音，則禁止再次產生連濁，以防止語意模糊。
                            </p>
                            
                            <div className="bg-slate-900 border border-rose-500/30 p-5 rounded-xl">
                                <div className="flex items-center gap-4 mb-4 text-left">
                                    <div className="w-12 h-12 rounded-full bg-rose-500/10 flex items-center justify-center text-rose-500 border border-rose-500/20">
                                        <i data-lucide="shield-alert"></i>
                                    </div>
                                    <div>
                                        <div className="text-xs font-mono text-rose-400 uppercase font-bold">Error Detected</div>
                                        <div className="text-sm text-slate-300 italic">"Too many Dakuon in one unit"</div>
                                    </div>
                                </div>
                                
                                <div className="flex flex-col gap-3">
                                    <div className="flex justify-between items-center p-3 bg-slate-800 rounded-lg">
                                        <span className="text-slate-400 text-xs">やま + かじ</span>
                                        <span className="text-emerald-400 font-mono text-[10px] font-bold">PASS</span>
                                        <span className="text-white font-bold">やまかじ</span>
                                    </div>
                                    <div className="p-2 text-[10px] text-slate-500 text-center uppercase tracking-widest">
                                        因為「じ」已經是濁音，拒絕「か」轉為「讓」
                                    </div>
                                </div>
                            </div>
                        </div>
                    )
                },
                {
                    id: 2,
                    title: "高能爆破",
                    tag: "PRESSURE RELEASE",
                    iconName: "zap",
                    gradient: "from-amber-600/20 to-yellow-600/20",
                    content: (
                        <div className="space-y-6">
                            <div className="p-6 bg-slate-900 rounded-2xl border border-white/5 relative overflow-hidden text-left">
                                <div className="absolute top-0 right-0 p-4 opacity-10">
                                    <i data-lucide="activity" style={{width: 80, height: 80}}></i>
                                </div>
                                <h3 className="text-xl font-light text-white mb-4 italic tracking-wide">「瞬間爆發的 P 音」</h3>
                                <p className="text-slate-400 text-sm leading-relaxed mb-6">
                                    半濁音是系統在高壓狀態下的唯一出口。當發音經過 <span className="text-amber-400 font-bold">促音(っ)</span> 或 <span className="text-amber-400 font-bold">撥音(ん)</span> 的強力壓縮後，最流暢的釋放方式即是爆破。
                                </p>
                                
                                <div className="flex items-center justify-between gap-2">
                                    <div className="flex-1 bg-slate-800 p-4 rounded-xl border border-white/5 text-center">
                                        <span className="text-xs text-slate-500 block mb-1 uppercase font-mono">Compressed</span>
                                        <span className="text-xl font-bold text-white tracking-widest">きっ / さん</span>
                                    </div>
                                    <div className="text-amber-500 animate-pulse">
                                        <i data-lucide="chevron-right"></i>
                                    </div>
                                    <div className="flex-1 bg-amber-500/10 p-4 rounded-xl border border-amber-500/30 text-center">
                                        <span className="text-xs text-amber-500 block mb-1 uppercase font-mono font-bold">Blast Out</span>
                                        <span className="text-3xl font-bold text-amber-400">ぷ / ぽ</span>
                                    </div>
                                </div>
                            </div>
                            <div className="space-y-2 text-left">
                                <div className="p-3 bg-slate-800/40 rounded-xl border border-transparent hover:border-slate-700 flex justify-between items-center transition-all">
                                    <span className="text-slate-200">切符 (きっぷ)</span>
                                    <span className="text-[10px] font-mono text-slate-500 uppercase tracking-widest">P-Sound</span>
                                </div>
                                <div className="p-3 bg-slate-800/40 rounded-xl border border-transparent hover:border-slate-700 flex justify-between items-center transition-all">
                                    <span className="text-slate-200">散步 (さんぽ)</span>
                                    <span className="text-[10px] font-mono text-slate-500 uppercase tracking-widest">Nasal Compression</span>
                                </div>
                            </div>
                        </div>
                    )
                }
            ];

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab]);

            return (
                <div className="min-h-screen text-slate-200 p-4 md:p-12 flex flex-col items-center">
                    {/* Header */}
                    <div className="max-w-xl w-full flex items-center justify-between mb-12 animate-in fade-in duration-1000">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-600/40">
                                <i data-lucide="activity" className="text-white"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-black tracking-tight text-white uppercase leading-none">Phonetic Logic</h1>
                                <p className="text-[10px] text-blue-400 font-mono tracking-[0.3em] uppercase mt-1">Advanced Japanese Ed.</p>
                            </div>
                        </div>
                        <div className="px-3 py-1 rounded-full bg-slate-800 border border-slate-700 text-[10px] font-mono text-slate-400">
                            STATUS: ONLINE
                        </div>
                    </div>

                    {/* Main UI */}
                    <div className="max-w-xl w-full bg-slate-900/60 backdrop-blur-xl rounded-[2.5rem] border border-white/10 shadow-3xl overflow-hidden animate-in zoom-in-95 duration-700">
                        {/* Tabs */}
                        <div className="flex border-b border-white/5 p-2 bg-black/20">
                            {sections.map((section) => (
                                <button
                                    key={section.id}
                                    onClick={() => setActiveTab(section.id)}
                                    className={`flex-1 py-4 rounded-2xl flex flex-col items-center justify-center gap-2 transition-all duration-300 ${
                                        activeTab === section.id 
                                        ? 'bg-white/10 text-white shadow-inner scale-[1.02]' 
                                        : 'text-slate-500 hover:text-slate-300 hover:bg-white/5'
                                    }`}
                                >
                                    <i data-lucide={section.iconName} style={{width: 20, height: 20}} className={activeTab === section.id ? 'animate-pulse' : ''}></i>
                                    <span className="text-[10px] font-bold tracking-widest uppercase">{section.title}</span>
                                </button>
                            ))}
                        </div>

                        {/* Content */}
                        <div className={`p-8 md:p-10 transition-colors duration-1000 bg-gradient-to-b ${sections[activeTab].gradient} min-h-[420px]`}>
                            <div className="mb-10 text-left">
                                <span className="px-2 py-0.5 bg-white/5 text-[10px] font-black text-slate-400 rounded tracking-[0.2em] border border-white/5 uppercase">
                                    {sections[activeTab].tag}
                                </span>
                                <h2 className="text-4xl font-black text-white mt-3 tracking-tight italic">
                                    {sections[activeTab].title}
                                </h2>
                            </div>
                            
                            <div key={activeTab} className="animate-in fade-in slide-in-from-bottom-4 duration-700">
                                {sections[activeTab].content}
                            </div>
                        </div>

                        {/* Footer Controls */}
                        <div className="p-6 bg-black/40 border-t border-white/5 flex justify-between items-center">
                            <div className="flex gap-1.5">
                                {sections.map((_, idx) => (
                                    <div key={idx} className={`h-1 rounded-full transition-all duration-500 ${idx === activeTab ? 'w-10 bg-blue-500' : 'w-2 bg-slate-700'}`}></div>
                                ))}
                            </div>
                            <div className="flex gap-4">
                                <button 
                                    onClick={() => setActiveTab(Math.max(0, activeTab - 1))}
                                    className="p-3 rounded-full border border-white/10 hover:bg-white/10 disabled:opacity-10 transition-all active:scale-90"
                                    disabled={activeTab === 0}
                                >
                                    <i data-lucide="chevron-left"></i>
                                </button>
                                <button 
                                    onClick={() => setActiveTab(Math.min(sections.length - 1, activeTab + 1))}
                                    className="p-3 rounded-full bg-blue-600 hover:bg-blue-500 disabled:opacity-10 transition-all shadow-lg shadow-blue-600/40 text-white active:scale-95"
                                    disabled={activeTab === sections.length - 1}
                                >
                                    <i data-lucide="chevron-right"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="mt-16 text-center space-y-3 opacity-40">
                        <p className="text-[10px] font-mono tracking-[0.4em] uppercase">Architecture by Gemini System Labs</p>
                        <div className="flex justify-center gap-6 text-[9px] font-bold">
                            <span>UI/UX: MODERN MINIMALIST</span>
                            <span>REACTIVE SYNC: ACTIVE</span>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
